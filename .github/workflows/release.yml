name: Release
on:
  push:
    tags:
      - "v*"
jobs:
  validate:
    name: Validate versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check VERSION / pyproject / Cargo manifests
        run: python3 scripts/check_versions.py
      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Git tag v$TAG must match VERSION ($VER)"
            exit 1
          fi
  release_pypi:
    name: Publish PyPI (tickerforge-spec-data)
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          attestations: false
  release_crates:
    name: Publish crates.io (tickerforge-spec-data)
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --locked
