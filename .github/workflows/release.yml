name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-python:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate versions and assets
        run: |
          python3 scripts/check_versions.py
          python3 scripts/sync_packaging_assets.py --check

      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build packaging/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packaging/python/dist/

  publish-rust:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate versions and assets
        run: |
          python scripts/check_versions.py
          python scripts/sync_packaging_assets.py --check

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path packaging/rust/Cargo.toml
