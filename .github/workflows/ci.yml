name: CI
on:
  pull_request:
  push:
jobs:
  lint:
    name: Lint (YAML & hygiene)
    runs-on: ubuntu-latest
    env:
      # Keep in sync with google/yamlfmt rev in .pre-commit-config.yaml
      YAMLFMT_VERSION: v0.21.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run pre-commit (skip yamlfmt; lint-only check runs below)
        run: |
          python -m pip install --upgrade pip pre-commit
          SKIP=yamlfmt pre-commit run --all-files
      - name: yamlfmt (lint only, no writes)
        run: |
          go install "github.com/google/yamlfmt/cmd/yamlfmt@${YAMLFMT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          yamlfmt -lint .
  validate-and-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check versions
        run: python scripts/check_versions.py
      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Build Rust crate
        run: cargo check --manifest-path rust/Cargo.toml
