name: CI
on:
  pull_request:
  push:
jobs:
  lint:
    name: Lint (YAML & hygiene)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pre-commit
        run: |
          python -m pip install --upgrade pip pre-commit
          pre-commit run --all-files
  validate-and-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check versions
        run: python scripts/check_versions.py
      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Build Rust crate
        run: cargo check --manifest-path rust/Cargo.toml
