name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check versions
        run: python scripts/check_versions.py

      - name: Check packaging assets are synced
        run: python scripts/sync_packaging_assets.py --check

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build packaging/python

      - name: Build Rust crate
        run: cargo check --manifest-path packaging/rust/Cargo.toml
