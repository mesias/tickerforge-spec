<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="780" height="520" fill="none"/>

  <!-- Input ticker -->
  <rect x="310" y="16" width="160" height="38" rx="19" fill="#e3eaf5" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="390" y="40" text-anchor="middle" fill="#2c3e50" font-weight="600">Input ticker</text>

  <!-- Left branch label -->
  <text x="210" y="82" text-anchor="middle" fill="#6c7a89" font-size="12" font-style="italic">INDM26</text>
  <!-- Right branch label -->
  <text x="570" y="82" text-anchor="middle" fill="#6c7a89" font-size="12" font-style="italic">IND</text>

  <!-- Arrows from input -->
  <line x1="350" y1="54" x2="210" y2="100" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="54" x2="570" y2="100" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Full ticker path box -->
  <rect x="120" y="100" width="180" height="36" rx="6" fill="#d6e4f0" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="210" y="123" text-anchor="middle" fill="#2c3e50">Full ticker path</text>

  <!-- Arrow down from full ticker -->
  <line x1="210" y1="136" x2="210" y2="180" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Result: None/None -->
  <rect x="100" y="180" width="220" height="50" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.2"/>
  <text x="210" y="201" text-anchor="middle" fill="#555" font-size="12">reference_date = None</text>
  <text x="210" y="219" text-anchor="middle" fill="#555" font-size="12">is_trading_session = None</text>

  <!-- Root symbol path box -->
  <rect x="480" y="100" width="180" height="36" rx="6" fill="#d6e4f0" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="570" y="123" text-anchor="middle" fill="#2c3e50">Root symbol path</text>

  <!-- Arrow down -->
  <line x1="570" y1="136" x2="570" y2="174" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Coerce date -->
  <rect x="450" y="174" width="240" height="36" rx="6" fill="#d6e4f0" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="570" y="197" text-anchor="middle" fill="#2c3e50">Coerce date (explicit or today)</text>

  <!-- Arrow down -->
  <line x1="570" y1="210" x2="570" y2="248" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Generate front-month -->
  <rect x="450" y="248" width="240" height="36" rx="6" fill="#d6e4f0" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="570" y="271" text-anchor="middle" fill="#2c3e50">Generate front-month ticker</text>

  <!-- Arrow down -->
  <line x1="570" y1="284" x2="570" y2="322" stroke="#8fa4b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Diamond: Is date in calendar sessions? -->
  <polygon points="570,322 690,370 570,418 450,370" fill="#dce8f5" stroke="#7b9cc7" stroke-width="1.2"/>
  <text x="570" y="365" text-anchor="middle" fill="#2c3e50" font-size="12">Is date in</text>
  <text x="570" y="380" text-anchor="middle" fill="#2c3e50" font-size="12">calendar sessions?</text>

  <!-- Yes label -->
  <text x="388" y="400" text-anchor="middle" fill="#27ae60" font-weight="600" font-size="12">Yes</text>
  <!-- No label -->
  <text x="752" y="400" text-anchor="middle" fill="#c0392b" font-weight="600" font-size="12">No</text>

  <!-- Arrow left (Yes) -->
  <line x1="450" y1="370" x2="370" y2="450" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arrowGreen)"/>

  <!-- Arrow right (No) -->
  <line x1="690" y1="370" x2="720" y2="450" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrowRed)"/>

  <!-- Result: true -->
  <rect x="220" y="450" width="240" height="52" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.2"/>
  <text x="340" y="472" text-anchor="middle" fill="#1e8449" font-size="12">reference_date = date</text>
  <text x="340" y="490" text-anchor="middle" fill="#1e8449" font-size="12">is_trading_session = true</text>

  <!-- Result: false -->
  <rect x="600" y="450" width="240" height="52" rx="6" fill="#fadbd8" stroke="#c0392b" stroke-width="1.2"/>
  <text x="720" y="472" text-anchor="middle" fill="#922b21" font-size="12">reference_date = date</text>
  <text x="720" y="490" text-anchor="middle" fill="#922b21" font-size="12">is_trading_session = false</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8fa4b8" stroke-width="1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#27ae60" stroke-width="1"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
  </defs>
</svg>
