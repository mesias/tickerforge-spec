$schema: "https://json-schema.org/draft/2020-12/schema"
title: Equities Specification
description: Schema for specific non-derivative equities and similar cash assets.
type: object
required:
  - equities
properties:
  equities:
    type: array
    items:
      type: object
      required:
        - symbol
        - exchange
        - type
        - sessions
      properties:
        symbol:
          type: string
          description: The ticker symbol (e.g. PETR4).
        exchange:
          type: string
          description: The exchange code (e.g. B3).
        type:
          type: string
          enum: [equity, etf, reit, bdr, fund]
        description:
          type: string
        currency:
          type: string
        tick_size:
          type: number
        contract_multiplier:
          type: number
          description: Standard lot size multiplier
        aliases:
          type: array
          items:
            type: string
        sessions:
          type: object
          description: Trading sessions mapping by name.
          additionalProperties:
            type: object
            required:
              - start
              - end
            properties:
              start:
                type: string
              end:
                type: string
      additionalProperties: false
additionalProperties: false
