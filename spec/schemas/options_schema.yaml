$schema: "https://json-schema.org/draft/2020-12/schema"
title: Options Contract Rules
description: Schema for tickerforge-spec options contract rule files.
type: object
required:
  - options
properties:
  options:
    type: array
    items:
      type: object
      required:
        - type
        - exchange
        - option_style
        - ticker_format
        - expiration_rule
      properties:
        type:
          type: string
          enum:
            - equity
            - index
            - dollar
            - interest_rate
          description: Category of option contract.
        symbol:
          type: string
          description: Root symbol for non-equity options (e.g. IBOV, DOL, IDI).
        exchange:
          type: string
        description:
          type: string
        option_style:
          type: string
          enum:
            - american
            - european
        ticker_format:
          type: string
          description: Template for building the full option ticker string.
        call_month_codes:
          type: array
          description: Month codes for call options (equity options only).
          items:
            type: string
            pattern: "^[A-L]$"
          minItems: 12
          maxItems: 12
        put_month_codes:
          type: array
          description: Month codes for put options (equity options only).
          items:
            type: string
            pattern: "^[M-X]$"
          minItems: 12
          maxItems: 12
        month_codes:
          type: array
          description: Standard futures month codes (non-equity options).
          items:
            type: string
            pattern: "^[FGHJKMNQUVXZ]$"
          minItems: 1
        option_type_codes:
          type: object
          description: Mapping of call/put to their ticker codes.
          properties:
            call:
              type: string
            put:
              type: string
          required:
            - call
            - put
          additionalProperties: false
        expiration_rule:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - nearest_weekday_to_day
                - first_business_day
                - last_business_day
                - fixed_day
                - nth_weekday
                - schedule
            weekday:
              type: string
              enum:
                - monday
                - tuesday
                - wednesday
                - thursday
                - friday
            day:
              type: integer
              minimum: 1
              maximum: 31
            nth:
              type: integer
              minimum: 1
              maximum: 5
          additionalProperties: false
        underlyings:
          type: array
          description: List of underlying symbols (equity options only).
          items:
            type: string
          minItems: 1
      additionalProperties: false
additionalProperties: false
