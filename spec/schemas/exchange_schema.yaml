$schema: "https://json-schema.org/draft/2020-12/schema"
title: Exchange Metadata
description: Schema for tickerforge-spec exchange definition files.

type: object
required:
  - exchange
  - timezone
  - assets

properties:
  exchange:
    type: string
    description: Short exchange identifier (e.g. B3, CME).

  full_name:
    type: string
    description: Full legal or common name of the exchange.

  country:
    type: string
    description: ISO 3166-1 alpha-2 country code.
    pattern: "^[A-Z]{2}$"

  timezone:
    type: string
    description: IANA timezone identifier (e.g. America/Sao_Paulo).

  assets:
    type: object
    description: Map of asset/product identifiers to their metadata.
    additionalProperties:
      type: object
      required:
        - type
        - description
        - sessions
      properties:
        type:
          type: string
          enum:
            - future
            - option
        category:
          type: string
          enum:
            - index
            - currency
            - interest_rate
            - commodity
            - equity_option
            - index_option
            - dollar_option
            - rate_option
          description: Product category within the exchange.
        description:
          type: string
        sessions:
          type: object
          description: |
            Clock-time trading bands keyed by session name (YAML mapping order is preserved).
            Keys are band identifiers; values are start/end in HH:MM (exchange local time).
            The first key must be `regular`. Additional keys (e.g. afternoon) define further
            windows in order; gaps between end and the next start are implicit pauses.
            Loaders expose this as an ordered list of segments with `name` taken from each key.
          additionalProperties:
            type: object
            required:
              - start
              - end
            properties:
              start:
                type: string
                description: Session start time in HH:MM format.
                pattern: "^\\d{2}:\\d{2}$"
              end:
                type: string
                description: Session end time in HH:MM format.
                pattern: "^\\d{2}:\\d{2}$"
            additionalProperties: false
          minProperties: 1
      additionalProperties: false

additionalProperties: false
