$schema: "https://json-schema.org/draft/2020-12/schema"
title: Contract Rules
description: Schema for tickerforge-spec futures contract rule files.

type: object
required:
  - contracts

properties:
  contracts:
    type: array
    items:
      type: object
      required:
        - symbol
        - exchange
        - contract_cycle
        - expiration_rule
      properties:
        symbol:
          type: string
          description: Root symbol for the contract (e.g. WIN).

        exchange:
          type: string
          description: Exchange identifier this contract belongs to.

        description:
          type: string

        ticker_format:
          type: string
          description: Template for building the full ticker string.

        contract_cycle:
          type: array
          description: Month codes in which the contract expires.
          items:
            type: string
            pattern: "^[FGHJKMNQUVXZ]$"
          minItems: 1

        expiration_rule:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - nearest_weekday_to_day
                - first_business_day
                - last_business_day
                - fixed_day
                - nth_weekday
                - schedule
              description: >
                nearest_weekday_to_day: closest occurrence of weekday to a given
                calendar day.
                first_business_day: first business day of contract month.
                last_business_day: last business day of contract month.
                fixed_day: specific calendar day of contract month.
                nth_weekday: Nth occurrence of a weekday in contract month.
                schedule: dates vary per contract; see description field.
            weekday:
              type: string
              enum:
                - monday
                - tuesday
                - wednesday
                - thursday
                - friday
            day:
              type: integer
              description: Reference calendar day of the month.
              minimum: 1
              maximum: 31
            nth:
              type: integer
              description: Occurrence number (e.g. 3 for third Friday).
              minimum: 1
              maximum: 5
            description:
              type: string
              description: Human-readable note for schedule-type rules.
          additionalProperties: false
      additionalProperties: false

additionalProperties: false
