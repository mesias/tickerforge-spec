repos:
  - repo: local
    hooks:
      - id: sync-cargo-version
        name: sync root Cargo.toml version from VERSION
        entry: python3 scripts/sync_cargo_version.py
        language: system
        pass_filenames: false
        always_run: true
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
